# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    http_client:
        default_options:
            timeout: 180
            max_duration: 300
            http_version: '1.1'
            retry_failed:
                enabled: true
                max_retries: 3
                delay: 1000
                multiplier: 2
                max_delay: 8000

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
