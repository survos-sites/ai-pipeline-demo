name: Run pipelines & deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/data/images.json'   # re-run when image manifest changes
      - 'public/data/pdfs.json'     # re-run when PDF manifest changes
      - 'public/**/*.html'          # re-deploy when viewer/gallery changes
      - 'src/**'
      - 'config/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 4 * * 1'             # weekly refresh every Monday 04:00 UTC
  workflow_dispatch:                 # manual trigger from GitHub UI
    inputs:
      force:
        description: 'Re-run all tasks even if results exist (--force)'
        type: boolean
        default: false
      limit:
        description: 'Process only N entries (leave blank for all)'
        type: string
        default: ''

# Allow the workflow to commit result JSON files back to the repo
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  process:
    name: Run AI pipelines
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true       # pull Git LFS files (images)

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, curl, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build ranged LVA PDFs
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          mkdir -p public/images/lva
          python3 <<'PY'
          import json, os, re, subprocess, tempfile, urllib.request

          manifest = 'public/data/pdfs.json'
          if not os.path.isfile(manifest):
              raise SystemExit(0)

          with open(manifest, 'r', encoding='utf-8') as f:
              entries = json.load(f)

          for entry in entries:
              md = entry.get('metadata') or {}
              if md.get('source') != 'library_of_virginia_chancery':
                  continue

              rel_out = (entry.get('url') or '').strip()
              if not (rel_out.startswith('images/lva/') and rel_out.lower().endswith('.pdf')):
                  continue

              out_path = os.path.join('public', rel_out)
              if os.path.isfile(out_path):
                  print(f'exists: {out_path}')
                  continue

              case_images_url = (md.get('case_images_url') or '').strip()
              pages = md.get('selected_pages') or [1]
              if not case_images_url:
                  print(f'skip (missing case_images_url): {rel_out}')
                  continue

              html = urllib.request.urlopen(case_images_url, timeout=45).read().decode('utf-8', 'ignore')
              media = re.findall(r'myImages\[\d+\]\s*=\s*"([^"]+)"\s*;', html)
              pdfs = [u for u in media if re.search(r'\.pdf($|\?)', u, flags=re.I)]
              if not pdfs:
                  print(f'skip (no page PDFs found): {rel_out}')
                  continue

              selected = []
              for p in pages:
                  try:
                      p = int(p)
                  except Exception:
                      continue
                  if 1 <= p <= len(pdfs):
                      selected.append(pdfs[p - 1])

              if not selected:
                  print(f'skip (selected_pages out of range): {rel_out}')
                  continue

              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              with tempfile.TemporaryDirectory(prefix='lva_pdf_') as td:
                  parts = []
                  for i, u in enumerate(selected, start=1):
                      part = os.path.join(td, f'{i:04d}.pdf')
                      urllib.request.urlretrieve(u, part)
                      parts.append(part)

                  if len(parts) == 1:
                      os.replace(parts[0], out_path)
                  else:
                      cmd = ['pdfunite', *parts, out_path]
                      proc = subprocess.run(cmd, capture_output=True, text=True)
                      if proc.returncode != 0:
                          raise RuntimeError(f'pdfunite failed for {rel_out}: {proc.stderr.strip()}')

              print(f'generated: {out_path} ({len(selected)} pages)')
          PY

      # Entries with local-only files (file:// would resolve to missing paths in CI)
      # are skipped automatically by ProcessImagesCommand's accessibility check.
      # No special handling needed — the command warns and skips unreadable local files.
      - name: Run pipeline
        env:
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit=${{ inputs.limit }}"; fi
          bin/console app:process $ARGS --no-interaction -v

      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: update pipeline results [skip ci]"
          git push

  deploy:
    name: Deploy to GitHub Pages
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # pick up the commit made by the process job
          lfs: true          # pull Git LFS files (images) for the static site

      # ── PDF → page JPGs ──────────────────────────────────────────────────
      # Reads pdfs.json, downloads each remote PDF, splits into per-page
      # JPGs named by SHA1(url) to match what the static viewer expects.
      # Cached so pages are only re-split when pdfs.json changes.
      - name: Cache PDF page images
        uses: actions/cache@v4
        id: pdf-cache
        with:
          path: public/images/pages/
          key: pdf-pages-v2-${{ hashFiles('public/data/pdfs.json') }}

      - name: Split PDFs into page images
        if: steps.pdf-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y poppler-utils imagemagick jq
          mkdir -p public/images/lva
          mkdir -p public/images/pages

          # Build any missing merged LVA range PDFs referenced by manifest entries.
          python3 <<'PY'
          import json, os, re, subprocess, tempfile, urllib.request

          manifest = 'public/data/pdfs.json'
          if not os.path.isfile(manifest):
              raise SystemExit(0)

          with open(manifest, 'r', encoding='utf-8') as f:
              entries = json.load(f)

          for entry in entries:
              md = entry.get('metadata') or {}
              if md.get('source') != 'library_of_virginia_chancery':
                  continue

              rel_out = (entry.get('url') or '').strip()
              if not (rel_out.startswith('images/lva/') and rel_out.lower().endswith('.pdf')):
                  continue

              out_path = os.path.join('public', rel_out)
              if os.path.isfile(out_path):
                  continue

              case_images_url = (md.get('case_images_url') or '').strip()
              pages = md.get('selected_pages') or [1]
              if not case_images_url:
                  continue

              html = urllib.request.urlopen(case_images_url, timeout=45).read().decode('utf-8', 'ignore')
              media = re.findall(r'myImages\[\d+\]\s*=\s*"([^"]+)"\s*;', html)
              pdfs = [u for u in media if re.search(r'\.pdf($|\?)', u, flags=re.I)]
              selected = []
              for p in pages:
                  try:
                      p = int(p)
                  except Exception:
                      continue
                  if 1 <= p <= len(pdfs):
                      selected.append(pdfs[p - 1])
              if not selected:
                  continue

              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              with tempfile.TemporaryDirectory(prefix='lva_pdf_') as td:
                  parts = []
                  for i, u in enumerate(selected, start=1):
                      part = os.path.join(td, f'{i:04d}.pdf')
                      urllib.request.urlretrieve(u, part)
                      parts.append(part)
                  if len(parts) == 1:
                      os.replace(parts[0], out_path)
                  else:
                      cmd = ['pdfunite', *parts, out_path]
                      proc = subprocess.run(cmd, capture_output=True, text=True)
                      if proc.returncode != 0:
                          raise RuntimeError(proc.stderr.strip())
          PY

          # Read each PDF entry from the manifest and split using SHA1(url) prefix
          jq -r '.[].url' public/data/pdfs.json | while read -r url; do
            sha1=$(echo -n "$url" | sha1sum | cut -d' ' -f1)

            # Skip if pages already exist
            if ls public/images/pages/${sha1}-*.jpg 1>/dev/null 2>&1; then
              echo "  ${sha1}: pages exist — skipping"
              continue
            fi

            echo "Splitting ${sha1} (${url})..."

            # Resolve PDF to temp file (remote URL or local public/ path)
            tmpfile=$(mktemp /tmp/pdf_XXXXXX.pdf)
            if echo "$url" | grep -Eq '^https?://'; then
              if ! curl -fsSL -o "$tmpfile" "$url"; then
                echo "  ERROR: could not download $url"
                rm -f "$tmpfile"
                continue
              fi
            else
              local_pdf="public/$url"
              if [ ! -f "$local_pdf" ]; then
                echo "  ERROR: missing local PDF $local_pdf"
                rm -f "$tmpfile"
                continue
              fi
              cp "$local_pdf" "$tmpfile"
            fi

            pdftoppm -jpeg -r 200 "$tmpfile" "public/images/pages/${sha1}"
            rm -f "$tmpfile"
          done

          # Auto-crop whitespace borders from scanned pages
          if ls public/images/pages/*.jpg 1>/dev/null 2>&1; then
            echo "Cropping whitespace..."
            mogrify -fuzz 10% -trim +repage public/images/pages/*.jpg
          fi
          echo "Generated $(ls public/images/pages/*.jpg 2>/dev/null | wc -l) page images"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
